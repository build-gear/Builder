name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/*"

permissions:
  contents: read

concurrency:
  group: builder-gear-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    name: Release readiness (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - windows-2022
          - ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @builder/desktop exec playwright install chromium

      - name: Run release readiness gate
        run: pnpm release:check:fast

      - name: Verify generated release manifest
        run: pnpm release:verify -- apps/desktop/src-tauri/target/release-readiness/builder-gear-release-manifest.json

      - name: Run local service readiness audit
        run: pnpm service:readiness -- --manifest apps/desktop/src-tauri/target/release-readiness/builder-gear-release-manifest.json --skip-github --skip-updater --json

      - name: Stage verified release upload set
        run: pnpm release:stage-upload -- apps/desktop/src-tauri/target/release-readiness/builder-gear-release-manifest.json
